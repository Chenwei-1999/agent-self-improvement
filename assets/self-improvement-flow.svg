<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Self-Improvement Skill workflow</title>
  <desc id="desc">Conversation history is extracted into cards, scanned by GPT-5.3-Codex-Spark subagents in parallel, then synthesized by the main agent into evidence-backed rules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="0.52" stop-color="#eef7f5"/>
      <stop offset="1" stop-color="#f8f3ea"/>
    </linearGradient>
    <linearGradient id="dark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17202a"/>
      <stop offset="1" stop-color="#263747"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f766e"/>
      <stop offset="1" stop-color="#14b8a6"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-15%" y="-20%" width="130%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <marker id="arrow-teal" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M2,2 L10,6 L2,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .title { font: 800 46px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #111827; letter-spacing: 0; }
      .subtitle { font: 500 22px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #475569; letter-spacing: 0; }
      .section { font: 800 24px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f172a; letter-spacing: 0; }
      .label { font: 700 20px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #102033; letter-spacing: 0; }
      .small { font: 500 16px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526173; letter-spacing: 0; }
      .mini { font: 700 13px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #f8fafc; letter-spacing: 0; }
      .badge { font: 800 15px Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f766e; letter-spacing: 0; }
      .white { fill: #fff; }
    </style>
  </defs>

  <rect width="1600" height="900" rx="0" fill="url(#bg)"/>
  <circle cx="1370" cy="130" r="150" fill="#14b8a6" opacity="0.08"/>
  <circle cx="185" cy="760" r="170" fill="#f59e0b" opacity="0.10"/>

  <text x="90" y="92" class="title">Self-Improvement Skill</text>
  <text x="90" y="132" class="subtitle">Fast subagents scan real conversation history; the main agent turns evidence into durable rules.</text>

  <g transform="translate(90 190)">
    <rect x="0" y="0" width="360" height="560" rx="18" fill="#ffffff" stroke="#d8e2ea" filter="url(#shadow)"/>
    <text x="34" y="54" class="section">1. History to cards</text>
    <text x="34" y="91" class="small">Codex sessions, Claude projects,</text>
    <text x="34" y="116" class="small">exports, logs, memory notes</text>

    <g transform="translate(34 155)">
      <rect x="0" y="0" width="292" height="74" rx="12" fill="#f8fafc" stroke="#d7e0ea"/>
      <text x="22" y="31" class="label">Conversation history</text>
      <text x="22" y="56" class="small">source-of-truth dialogue</text>
    </g>
    <g transform="translate(34 260)">
      <rect x="0" y="0" width="292" height="74" rx="12" fill="#f8fafc" stroke="#d7e0ea"/>
      <text x="22" y="31" class="label">Extractor script</text>
      <text x="22" y="56" class="small">compact cards + manifest</text>
    </g>
    <g transform="translate(34 365)">
      <rect x="0" y="0" width="292" height="106" rx="12" fill="#f8fafc" stroke="#d7e0ea"/>
      <text x="22" y="31" class="label">Sharded cards</text>
      <text x="22" y="58" class="small">card-001 ... card-500</text>
      <text x="22" y="83" class="small">small enough for cheap scans</text>
    </g>
    <path d="M180 231 L180 251" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M180 336 L180 356" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <path d="M470 470 C535 470, 555 470, 610 470" fill="none" stroke="#334155" stroke-width="4" marker-end="url(#arrow)"/>

  <g transform="translate(610 170)">
    <rect x="0" y="0" width="455" height="600" rx="22" fill="url(#dark)" filter="url(#shadow)"/>
    <text x="34" y="60" class="section white">2. Parallel subagent scan</text>
    <text x="34" y="96" class="small" fill="#dbeafe">The cost win: broad coverage on fast scout models.</text>

    <rect x="34" y="126" width="160" height="34" rx="17" fill="#ccfbf1"/>
    <text x="53" y="149" class="badge">FAST TIER</text>
    <rect x="208" y="126" width="210" height="34" rx="17" fill="#fed7aa"/>
    <text x="228" y="149" class="badge" fill="#9a3412">LOW REASONING</text>

    <g transform="translate(34 196)">
      <rect x="0" y="0" width="178" height="108" rx="14" fill="url(#spark)"/>
      <text x="18" y="31" class="mini">code_scout</text>
      <text x="18" y="56" class="mini">GPT-5.3-</text>
      <text x="18" y="78" class="mini">Codex-Spark</text>
      <text x="18" y="99" class="mini">shard A</text>
    </g>
    <g transform="translate(244 196)">
      <rect x="0" y="0" width="178" height="108" rx="14" fill="url(#spark)"/>
      <text x="18" y="31" class="mini">code_scout</text>
      <text x="18" y="56" class="mini">GPT-5.3-</text>
      <text x="18" y="78" class="mini">Codex-Spark</text>
      <text x="18" y="99" class="mini">shard B</text>
    </g>
    <g transform="translate(34 334)">
      <rect x="0" y="0" width="178" height="108" rx="14" fill="url(#spark)"/>
      <text x="18" y="31" class="mini">code_scout</text>
      <text x="18" y="56" class="mini">GPT-5.3-</text>
      <text x="18" y="78" class="mini">Codex-Spark</text>
      <text x="18" y="99" class="mini">shard C</text>
    </g>
    <g transform="translate(244 334)">
      <rect x="0" y="0" width="178" height="108" rx="14" fill="#2563eb"/>
      <text x="18" y="31" class="mini">docs_researcher</text>
      <text x="18" y="56" class="mini">GPT-5.4-mini</text>
      <text x="18" y="78" class="mini">docs + policy</text>
      <text x="18" y="99" class="mini">sidecar scan</text>
    </g>
    <g transform="translate(66 490)">
      <path d="M0 0 L332 0" stroke="#5eead4" stroke-width="5" stroke-linecap="round"/>
      <circle cx="0" cy="0" r="8" fill="#5eead4"/>
      <circle cx="110" cy="0" r="8" fill="#5eead4"/>
      <circle cx="222" cy="0" r="8" fill="#5eead4"/>
      <circle cx="332" cy="0" r="8" fill="#5eead4"/>
      <text x="38" y="42" class="small" fill="#dffcf8">many shards scanned at once</text>
    </g>
  </g>

  <path d="M1085 470 C1148 470, 1165 470, 1215 470" fill="none" stroke="#0f766e" stroke-width="5" marker-end="url(#arrow-teal)"/>

  <g transform="translate(1215 190)">
    <rect x="0" y="0" width="295" height="560" rx="18" fill="#ffffff" stroke="#d8e2ea" filter="url(#shadow)"/>
    <text x="30" y="54" class="section">3. Main agent synthesis</text>
    <text x="30" y="91" class="small">judgment stays with the</text>
    <text x="30" y="116" class="small">stronger coordinating agent</text>

    <g transform="translate(30 158)">
      <rect x="0" y="0" width="235" height="82" rx="12" fill="#fff7ed" stroke="#fed7aa"/>
      <text x="20" y="34" class="label">Evidence ledger</text>
      <text x="20" y="59" class="small">card ids + findings</text>
    </g>
    <g transform="translate(30 270)">
      <rect x="0" y="0" width="235" height="82" rx="12" fill="#ecfdf5" stroke="#99f6e4"/>
      <text x="20" y="34" class="label">Durable rules</text>
      <text x="20" y="59" class="small">global vs project scope</text>
    </g>
    <g transform="translate(30 382)">
      <rect x="0" y="0" width="235" height="104" rx="12" fill="#eff6ff" stroke="#bfdbfe"/>
      <text x="20" y="34" class="label">Install targets</text>
      <text x="20" y="61" class="small">AGENTS.md</text>
      <text x="20" y="84" class="small">CLAUDE.md / skills</text>
    </g>
    <path d="M148 242 L148 262" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
    <path d="M148 354 L148 374" stroke="#334155" stroke-width="3" marker-end="url(#arrow)"/>
  </g>

  <g transform="translate(384 796)">
    <rect x="0" y="0" width="832" height="52" rx="26" fill="#111827"/>
    <text x="34" y="34" class="small" fill="#f8fafc">Main claim: spend strong-model attention on synthesis, not on 50k-token grep over chat history.</text>
  </g>
</svg>

